spring:
  application:
    name: ms_bulletin
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:ms_bulletin}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:passer}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
