services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - kafka_network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - kafka_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  postgres_scolarite:
    image: postgres:15
    container_name: postgres_scolarite
    environment:
      POSTGRES_DB: ms_scolarite_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    networks:
      - kafka_network

  postgres_notes:
    image: postgres:15
    container_name: postgres_notes
    environment:
      POSTGRES_DB: ms_notes
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    networks:
      - kafka_network

  postgres_bulletin:
    image: postgres:15
    container_name: postgres_bulletin
    environment:
      POSTGRES_DB: ms_bulletin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    networks:
      - kafka_network

  ms_scolarite:
    build: ./ms_scolarite
    container_name: ms_scolarite
    depends_on:
      kafka:
        condition: service_healthy
      postgres_scolarite:
        condition: service_started
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_scolarite:5432/ms_scolarite_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - kafka_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:8081/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  ms_notes:
    build: ./ms_notes
    container_name: ms_notes
    depends_on:
      ms_scolarite:
        condition: service_healthy
      postgres_notes:
        condition: service_started
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_notes:5432/ms_notes
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - kafka_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:8082/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  ms_bulletin:
    build: ./ms_bulletin
    container_name: ms_bulletin
    depends_on:
      ms_notes:
        condition: service_healthy
      postgres_bulletin:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_bulletin:5432/ms_bulletin
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    networks:
      - kafka_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:8083/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  gateway:
    build: ./gateway
    container_name: gateway
    depends_on:
      ms_scolarite:
        condition: service_healthy
      ms_notes:
        condition: service_healthy
      ms_bulletin:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_HOST: 45.134.226.100
      KEYCLOAK_PORT: 9090
      KEYCLOAK_REALM: examen_java
      MS_SCOLARITE_HOST: ms_scolarite
      MS_NOTES_HOST: ms_notes
      MS_BULLETIN_HOST: ms_bulletin
    networks:
      - kafka_network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - kafka_network

networks:
  kafka_network:
